
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --bg:#F2F1EE;--surface:#FFFFFF;--surface-2:#FAFAF8;
  --border:rgba(0,0,0,.07);--border-md:rgba(0,0,0,.13);--border-strong:rgba(0,0,0,.2);
  --text:#181816;--text-2:#5E5E5A;--text-3:#A4A49F;
  --teal:#0D6E56;--teal-bg:#E1F5EE;--teal-mid:#5DCAA5;
  --amber:#7A4808;--amber-bg:#FDF0DB;
  --blue:#185FA5;--blue-bg:#EBF3FD;
  --red:#952929;--red-bg:#FDEAEA;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --radius:10px;--radius-sm:6px;
}
#root{font-family:var(--font);background:var(--bg);min-height:640px;display:flex;flex-direction:column;border-radius:12px;overflow:hidden;color:var(--text)}

/* ── NAV ── */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:stretch;justify-content:space-between;flex-shrink:0;gap:0}
.nav-brand{display:flex;align-items:center;gap:7px;padding:13px 0}
.nav-logo{width:18px;height:18px;border-radius:4px;background:var(--text);display:flex;align-items:center;justify-content:center}
.nav-logo svg{width:10px;height:10px;fill:white}
.nav-title{font-size:13px;font-weight:500;letter-spacing:-.01em}
.nav-tabs{display:flex;gap:0}
.nav-tab{font-size:12px;color:var(--text-3);padding:0 18px;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;transition:color .12s;white-space:nowrap}
.nav-tab:hover{color:var(--text-2)}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.nav-count{font-size:10px;background:var(--bg);color:var(--text-3);padding:1px 6px;border-radius:10px;font-family:var(--mono)}
.nav-tab.active .nav-count{background:var(--text);color:#fff}
.nav-right{display:flex;align-items:center;font-size:11px;color:var(--text-3);font-family:var(--mono);gap:10px}
.nav-right-dot{width:6px;height:6px;border-radius:50%;background:var(--teal-mid)}

.screen{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
.screen.active{display:flex}

/* ── TOOLTIP ── */
.tip{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:var(--bg);border:1px solid var(--border-md);font-size:9px;color:var(--text-3);cursor:default;position:relative;flex-shrink:0;vertical-align:middle}
.tip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);white-space:normal;background:var(--text);color:#fff;font-size:10px;padding:5px 9px;border-radius:5px;pointer-events:none;z-index:999;line-height:1.5;width:190px;text-align:center}
.tip:hover::before{content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--text)}

/* ── TOOLBAR ── */
.toolbar{padding:9px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:7px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.fsel{font-size:12px;font-family:var(--font);padding:5px 22px 5px 9px;border:1px solid var(--border-md);border-radius:18px;background:var(--surface);color:var(--text-2);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%23A4A49F' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center;transition:border-color .12s}
.fsel:focus,.fsel:hover{border-color:var(--border-strong)}
.finput{font-size:12px;font-family:var(--font);padding:5px 9px 5px 28px;border:1px solid var(--border-md);border-radius:18px;background:var(--surface);color:var(--text);outline:none;min-width:130px;background-image:url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='5' cy='5' r='3.5' stroke='%23A4A49F' stroke-width='1.2'/%3E%3Cpath d='M8 8l2 2' stroke='%23A4A49F' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:9px center;transition:border-color .12s}
.finput:focus{border-color:var(--border-strong)}
.finput::placeholder{color:var(--text-3)}
.toolbar-sep{width:1px;height:18px;background:var(--border-md);flex-shrink:0;margin:0 2px}
.sort-group{display:flex;align-items:center;gap:5px}
.sort-label{font-size:11px;color:var(--text-3);white-space:nowrap}
.sort-dir-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border-md);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:13px;transition:all .12s;flex-shrink:0}
.sort-dir-btn:hover{border-color:var(--border-strong);background:var(--bg)}
.result-count{font-size:11px;color:var(--text-3);font-family:var(--mono);margin-left:auto;white-space:nowrap}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:2px;flex-shrink:0}
.vbtn{width:26px;height:22px;border:none;background:none;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:all .12s}
.vbtn svg{width:12px;height:12px}
.vbtn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.09)}

/* ── BROWSE GRID ── */
.browse-scroll{overflow-y:auto;flex:1;padding:14px 20px}
.grid-large{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-medium{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grid-small{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.list-view{display:flex;flex-direction:column;gap:5px}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s;position:relative}
.card:hover{border-color:var(--border-md);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card:hover .card-actions{opacity:1;transform:translateY(0)}
.card-img{width:100%;aspect-ratio:16/9;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:9px 10px}
.card-name{font-size:12px;font-weight:500;margin-bottom:5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tags{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:5px}
.tag{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:500;letter-spacing:.01em}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-teal{background:var(--teal-bg);color:var(--teal)}
.tag-amber{background:var(--amber-bg);color:var(--amber)}
.tag-gray{background:#EEECEA;color:#5E5E5A}
.card-date{font-size:10px;color:var(--text-3);font-family:var(--mono)}
.card-actions{position:absolute;top:6px;right:6px;display:flex;gap:3px;opacity:0;transform:translateY(-3px);transition:opacity .15s,transform .15s}
.card-action-btn{width:24px;height:24px;border-radius:5px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;background:rgba(255,255,255,.93);backdrop-filter:blur(4px);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.card-action-btn.del{color:var(--red)}
.card-action-btn:hover{background:#fff}
/* small card tweaks */
.card-sm .card-body{padding:5px 6px}
.card-sm .card-name{font-size:10px;margin-bottom:2px}
.card-sm .tags{display:none}
.card-sm .card-date{font-size:9px}
/* medium */
.card-md .card-body{padding:7px 8px}
.card-md .card-name{font-size:11px}

/* LIST ROW */
.list-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:10px;padding:7px 12px;cursor:pointer;transition:border-color .12s,box-shadow .12s}
.list-row:hover{border-color:var(--border-md);box-shadow:0 1px 5px rgba(0,0,0,.05)}
.list-thumb{width:60px;min-width:60px;aspect-ratio:16/9;border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.list-thumb img{width:100%;height:100%;object-fit:cover}
.list-name{font-size:12px;font-weight:500;min-width:130px;color:var(--text)}
.list-tags{display:flex;gap:3px;flex:1;flex-wrap:wrap}
.list-date{font-size:10px;color:var(--text-3);font-family:var(--mono);min-width:68px;text-align:right}
.list-btns{display:flex;gap:4px;margin-left:6px}
.list-btn{font-size:11px;padding:4px 8px;border-radius:5px;border:1px solid var(--border-md);background:none;cursor:pointer;font-family:var(--font);color:var(--text-2);transition:all .12s}
.list-btn:hover{border-color:var(--border-strong);color:var(--text)}
.list-btn.del{color:var(--red);border-color:rgba(149,41,41,.15)}
.list-btn.del:hover{background:var(--red-bg)}

/* EMPTY */
.browse-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:50px 20px;color:var(--text-3);text-align:center}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:12px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal-head{padding:15px 20px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:500}
.modal-close{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-3);line-height:1;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:background .12s}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.modal-img{width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
.modal-img img{width:100%;height:100%;object-fit:cover}
.mform{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mf{display:flex;flex-direction:column;gap:3px}
.mf.full{grid-column:1/-1}
.mf-lbl{font-size:10px;color:var(--text-3);font-weight:500;letter-spacing:.03em;text-transform:uppercase;display:flex;align-items:center;gap:3px}
.mf-inp{font-size:13px;font-family:var(--font);padding:7px 10px;border:1px solid var(--border-md);border-radius:6px;background:var(--bg);color:var(--text);outline:none;width:100%;transition:border-color .12s}
.mf-inp:focus{border-color:var(--border-strong);background:var(--surface)}
.modal-foot{padding:11px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;align-items:center}
.modal-foot-left{margin-right:auto}
.btn{font-size:13px;padding:7px 16px;border-radius:6px;border:1px solid var(--border-md);background:none;cursor:pointer;font-family:var(--font);color:var(--text-2);transition:all .12s}
.btn:hover{border-color:var(--border-strong);color:var(--text)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{opacity:.85;color:#fff}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:rgba(149,41,41,.2)}
.btn-danger:hover{background:#f9d5d5}
.del-confirm-body{padding:20px;text-align:center;display:flex;flex-direction:column;gap:14px;align-items:center}
.del-thumb{width:120px;aspect-ratio:16/9;border-radius:6px;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center}
.del-thumb img{width:100%;height:100%;object-fit:cover}

/* ── UPLOAD ── */
.upload-wrap{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.dropzone{border:1.5px dashed var(--border-md);border-radius:var(--radius);background:var(--surface);padding:22px 20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.dropzone:hover,.dropzone.drag{border-color:var(--text-2);background:var(--surface-2)}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:18px;margin-bottom:5px;opacity:.5}
.dz-title{font-size:13px;font-weight:500;margin-bottom:3px}
.dz-sub{font-size:11px;color:var(--text-3);line-height:1.6}
.dz-chip{margin-top:8px;font-size:10px;color:var(--text-3);background:var(--bg);border-radius:20px;padding:3px 10px;display:inline-block}
.qheader{display:none;align-items:flex-start;justify-content:space-between}
.qheader.visible{display:flex}
.qlabel{font-size:12px;font-weight:500;color:var(--text-2)}
.qhint{font-size:11px;color:var(--text-3);margin-top:2px}
.queue-list{display:flex;flex-direction:column;gap:8px}
.queue-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.qi-top{display:flex;gap:10px;padding:10px;align-items:flex-start}
.qi-thumb{width:84px;min-width:84px;aspect-ratio:16/9;background:var(--bg);border-radius:5px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.qi-thumb img{width:100%;height:100%;object-fit:cover}
.qi-fields{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.qi-field{display:flex;flex-direction:column;gap:3px}
.qi-lbl{font-size:10px;color:var(--text-3);font-weight:500;letter-spacing:.02em;text-transform:uppercase;display:flex;align-items:center;gap:3px}
.qi-inp{font-size:12px;font-family:var(--font);padding:5px 7px;border:1px solid var(--border-md);border-radius:5px;background:var(--bg);color:var(--text);outline:none;width:100%;transition:border-color .12s}
.qi-inp:focus{border-color:var(--border-strong);background:var(--surface)}
.qi-inp.ai{border-color:#9FE1CB;background:#F2FDF9}
.qstatus{display:flex;align-items:center;gap:6px;padding:5px 10px 8px;flex-wrap:wrap}
.sdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.s-analyzing{background:var(--amber);animation:pulse 1s ease-in-out infinite}
.s-done{background:var(--teal)}
.s-error{background:var(--red)}
.stext{font-size:10px;color:var(--text-3);font-family:var(--mono)}
.ai-badge{font-size:9px;background:var(--teal-bg);color:var(--teal);padding:1px 6px;border-radius:8px;font-weight:500}
.qi-rm{font-size:11px;color:var(--text-3);background:none;border:none;cursor:pointer;padding:0 3px;flex-shrink:0;transition:color .12s}
.qi-rm:hover{color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── EXPORT ── */
.export-wrap{flex:1;display:flex;overflow:hidden}
.export-sidebar{width:196px;min-width:196px;background:var(--surface);border-right:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
.sb-label{font-size:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);display:flex;align-items:center;gap:4px}
.sb-sel{width:100%;font-size:12px;font-family:var(--font);padding:6px 8px;border:1px solid var(--border-md);border-radius:6px;background:var(--bg);color:var(--text);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .12s}
.sb-sel:focus{border-color:var(--border-strong)}
.sb-inp{width:100%;font-size:12px;font-family:var(--font);padding:6px 8px;border:1px solid var(--border-md);border-radius:6px;background:var(--bg);color:var(--text);outline:none;transition:border-color .12s}
.sb-inp::placeholder{color:var(--text-3)}
.sb-inp:focus{border-color:var(--border-strong)}
.sb-divider{border:none;border-top:1px solid var(--border);margin:0}
.exp-opts{display:flex;flex-direction:column;gap:5px}
.opt-row{display:flex;align-items:center;gap:6px;cursor:pointer}
.opt-row input{width:12px;height:12px;cursor:pointer;accent-color:var(--teal)}
.opt-lbl{font-size:11px;color:var(--text-2);user-select:none}
.opt-hint{font-size:10px;color:var(--text-3)}
.btn-gen{width:100%;font-size:12px;padding:8px;border-radius:7px;background:var(--text);color:#fff;border:none;cursor:pointer;font-family:var(--font);font-weight:500;transition:opacity .12s;margin-top:auto}
.btn-gen:hover{opacity:.83}

.export-main{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;min-width:0}
.export-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-3)}

/* DOC PREVIEW */
.doc-header-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.doc-title{font-size:14px;font-weight:500}
.doc-sub{font-size:11px;color:var(--text-3);margin-top:2px;font-family:var(--mono)}
.doc-export-btn{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border-md);background:var(--surface);cursor:pointer;font-family:var(--font);white-space:nowrap;flex-shrink:0;transition:all .12s}
.doc-export-btn:hover{border-color:var(--border-strong)}
.doc-preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.doc-head{padding:13px 16px;border-bottom:1px solid var(--border)}
.doc-head-title{font-size:13px;font-weight:500;margin-bottom:2px}
.doc-head-sub{font-size:10px;color:var(--text-3);font-family:var(--mono)}
.doc-hint{font-size:11px;color:var(--text-3);background:var(--bg);padding:6px 10px;border-radius:6px;display:flex;align-items:center;gap:5px}

/* DRAG-REORDER GRID */
.reorder-grid{padding:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.doc-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:grab;transition:box-shadow .15s,border-color .15s;position:relative;user-select:none}
.doc-card.dragging{opacity:.4;cursor:grabbing}
.doc-card.drag-over{border-color:var(--teal-mid);box-shadow:0 0 0 2px var(--teal-bg)}
.doc-card:active{cursor:grabbing}
.doc-card-img{width:100%;aspect-ratio:16/9;background:var(--surface-2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.doc-card-img img{width:100%;height:100%;object-fit:cover}
.doc-card-body{padding:6px 8px}
.doc-card-name{font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-card-meta{font-size:9px;color:var(--text-3);font-family:var(--mono);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-card-handle{position:absolute;top:4px;left:4px;width:16px;height:16px;border-radius:3px;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s}
.doc-card:hover .doc-card-handle{opacity:1}
.doc-card-remove{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:3px;background:rgba(255,255,255,.85);border:none;cursor:pointer;font-size:9px;color:var(--red);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .12s}
.doc-card:hover .doc-card-remove{opacity:1}
.doc-card-idx{position:absolute;bottom:4px;left:4px;width:16px;height:16px;border-radius:3px;background:rgba(0,0,0,.45);font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono)}

.warning-bar{background:var(--amber-bg);border-radius:7px;padding:7px 10px;font-size:11px;color:var(--amber);display:flex;gap:6px;line-height:1.5}
.ph-tving{background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;color:#e94560;font-size:9px;font-weight:700;letter-spacing:.1em;font-family:var(--mono)}
.ph-wavve{background:linear-gradient(135deg,#00b4db,#0083b0);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700;letter-spacing:.1em;font-family:var(--mono)}
</style>

<div id="root"></div>

<script>
const INDUSTRIES=["Alcohol","App/Service","Auto","Bank/Card","Beauty","Beverage","Commerce/Retail","Consumer Goods","Consumer Electronics","Education","Entertainment","Fashion","Food","Food Franchise","Functional Food","Game","Government","Home","Insurance","Investment/Securities","Pharma","PR","Telecom","Travel","Etc."];

function tagColor(v){if(PLATFORMS.includes(v))return"tag-blue";if(DEVICES.includes(v))return"tag-teal";if(PRODUCTS.includes(v))return"tag-amber";return"tag-gray"}
function selOpts(arr,sel="",empty="전체"){return`<option value="">${empty}</option>`+arr.map(o=>`<option ${o===sel?"selected":""}>${o}</option>`).join('')}
function tipEl(t){return`<span class="tip" data-tip="${t}">?</span>`}

/* ── SORT ── */
function applySort(arr){
  return [...arr].sort((a,b)=>{
    if(sortKey==='date_desc'||sortKey==='date_asc'){
      const da=a.date.replace(/\./g,''),db=b.date.replace(/\./g,'');
      return sortKey==='date_desc'?db.localeCompare(da):da.localeCompare(db);
    }
    if(sortKey==='advertiser_asc') return a.advertiser.localeCompare(b.advertiser);
    if(sortKey==='platform') return a.platform.localeCompare(b.platform)||a.advertiser.localeCompare(b.advertiser);
    if(sortKey==='product') return a.product.localeCompare(b.product)||a.advertiser.localeCompare(b.advertiser);
    return 0;
  });
}

/* ── FILTERS ── */
function getFiltered(){
  const adv=(document.getElementById('f-adv')||{}).value||'';
  const plat=(document.getElementById('f-plat')||{}).value||'';
  const dev=(document.getElementById('f-dev')||{}).value||'';
  const ind=(document.getElementById('f-ind')||{}).value||'';
  const prod=(document.getElementById('f-prod')||{}).value||'';
  const filtered=items.filter(c=>{
    if(adv&&!c.advertiser.toLowerCase().includes(adv.toLowerCase()))return false;
    if(plat&&c.platform!==plat)return false;
    if(dev&&c.device!==dev)return false;
    if(ind&&c.industry!==ind)return false;
    if(prod&&c.product!==prod)return false;
    return true;
  });
  return applySort(filtered);
}

/* ── UPLOAD ── */
async function analyzeImage(file,idx){
  setQStatus(idx,'analyzing','AI가 이미지를 분석하고 있어요...');
  const b64=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.readAsDataURL(file)});
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},{type:'text',text:`Korean streaming ad screenshot. Return ONLY JSON: {"advertiser":"English brand","industry":"one of:${INDUSTRIES.join(',')}","platform":"TVING or Wavve","device":"one of:${DEVICES.join(',')}","product":"one of:${PRODUCTS.join(',')}"}`}]}]})});
    const data=await resp.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'{}';
    let p={};try{p=JSON.parse(text.replace(/```json|```/g,''))}catch(e){}
    queue[idx]={...queue[idx],...p,aiDone:true};
    refillQ(idx);setQStatus(idx,'done','AI 분석 완료 — 확인 후 수정해 주세요');
  }catch(e){setQStatus(idx,'error','분석 실패 — 직접 입력해 주세요')}
}
function setQStatus(idx,type,text){
  const el=document.getElementById(`qs-${idx}`);if(!el)return;
  const ai=type==='done'?`<span class="ai-badge">AI 자동입력</span>`:'';
  el.innerHTML=`<span class="sdot s-${type}"></span><span class="stext">${text}</span>${ai}`;
}
function refillQ(idx){
  const item=queue[idx];if(!item)return;
  const map={adv:'advertiser',ind:'industry',plat:'platform',dev:'device',prod:'product'};
  Object.entries(map).forEach(([k,v])=>{const el=document.getElementById(`qi-${k}-${idx}`);if(!el)return;if(el.tagName==='INPUT')el.value=item[v]||'';else Array.from(el.options).forEach(o=>{if(o.value===item[v])o.selected=true});el.classList.add('ai')});
}
function addFiles(files){
  Array.from(files).forEach((file,i)=>{
    const idx=queue.length,url=URL.createObjectURL(file);
    queue.push({file,url,advertiser:'',industry:'',platform:'',device:'',product:'',memo:'',campaign:'',aiDone:false});
    const list=document.getElementById('queue-list');
    const div=document.createElement('div');div.className='queue-item';div.id=`qi-${idx}`;
    div.innerHTML=`<div class="qi-top"><div class="qi-thumb"><img src="${url}" alt=""></div><div class="qi-fields">
      <div class="qi-field"><div class="qi-lbl">광고주 ${tipEl('AI가 자동 입력')}</div><input class="qi-inp" id="qi-adv-${idx}" placeholder="예: Samsung"></div>
      <div class="qi-field"><div class="qi-lbl">업종</div><select class="qi-inp" id="qi-ind-${idx}">${selOpts(INDUSTRIES,'','선택')}</select></div>
      <div class="qi-field"><div class="qi-lbl">지면</div><select class="qi-inp" id="qi-plat-${idx}">${selOpts(PLATFORMS,'','선택')}</select></div>
      <div class="qi-field"><div class="qi-lbl">디바이스</div><select class="qi-inp" id="qi-dev-${idx}">${selOpts(DEVICES,'','선택')}</select></div>
      <div class="qi-field"><div class="qi-lbl">상품 유형</div><select class="qi-inp" id="qi-prod-${idx}">${selOpts(PRODUCTS,'','선택')}</select></div>
      <div class="qi-field"><div class="qi-lbl">캠페인 ID ${tipEl('내보낼 때 제외 가능')}</div><input class="qi-inp" id="qi-camp-${idx}" placeholder="CMP-XXX"></div>
      <div class="qi-field" style="grid-column:1/-1"><div class="qi-lbl">메모 ${tipEl('내보낼 때 제외 가능')}</div><input class="qi-inp" id="qi-memo-${idx}" placeholder="특이사항 (선택)"></div>
    </div><button class="qi-rm" onclick="removeQ(${idx})">✕</button></div>
    <div class="qstatus" id="qs-${idx}"><span class="sdot s-analyzing"></span><span class="stext">분석 대기 중...</span></div>`;
    list.appendChild(div);
    const qh=document.getElementById('qheader');if(qh)qh.classList.add('visible');
    const bs=document.getElementById('bsave');if(bs)bs.disabled=false;
    setTimeout(()=>analyzeImage(file,idx),i*400);
  });
}
function removeQ(idx){queue[idx]=null;const el=document.getElementById(`qi-${idx}`);if(el)el.remove();if(!queue.filter(Boolean).length){const qh=document.getElementById('qheader');if(qh)qh.classList.remove('visible');const bs=document.getElementById('bsave');if(bs)bs.disabled=true;}}
function saveAll(){
  queue.forEach((item,idx)=>{
    if(!item)return;
    const adv=document.getElementById(`qi-adv-${idx}`)?.value||'';if(!adv)return;
    const plat=document.getElementById(`qi-plat-${idx}`)?.value||'TVING';
    items.unshift({id:nextId++,advertiser:adv,industry:document.getElementById(`qi-ind-${idx}`)?.value||'',platform:plat,device:document.getElementById(`qi-dev-${idx}`)?.value||'',product:document.getElementById(`qi-prod-${idx}`)?.value||'',memo:document.getElementById(`qi-memo-${idx}`)?.value||'',campaign:document.getElementById(`qi-camp-${idx}`)?.value||'',date:new Date().toISOString().slice(0,10).replace(/-/g,'.'),url:item.url,phClass:plat==='Wavve'?'ph-wavve':'ph-tving'});
  });
  queue=[];document.getElementById('queue-list').innerHTML='';
  const qh=document.getElementById('qheader');if(qh)qh.classList.remove('visible');
  const bs=document.getElementById('bsave');if(bs)bs.disabled=true;
  switchTab('browse');
}

/* ── EXPORT ── */
function generateDoc(){
  const adv=(document.getElementById('d-adv')||{}).value||'';
  const plat=(document.getElementById('d-plat')||{}).value||'';
  const dev=(document.getElementById('d-dev')||{}).value||'';
  const prod=(document.getElementById('d-prod')||{}).value||'';
  const ind=(document.getElementById('d-ind')||{}).value||'';
  const checked=EXPORT_FIELDS.filter(f=>(document.getElementById(f.id)||{}).checked).map(f=>f.id.replace('ef_',''));
  const hasSensitive=EXPORT_FIELDS.some(f=>f.sensitive&&(document.getElementById(f.id)||{}).checked);
  const filtered=items.filter(c=>{
    if(adv&&!c.advertiser.toLowerCase().includes(adv.toLowerCase()))return false;
    if(plat&&c.platform!==plat)return false;
    if(dev&&c.device!==dev)return false;
    if(prod&&c.product!==prod)return false;
    if(ind&&c.industry!==ind)return false;
    return true;
  });
  docItems=applySort([...filtered]);
  renderDocPreview(checked,hasSensitive,filtered.length);
}

function renderDocPreview(checked,hasSensitive,totalCount){
  const main=document.getElementById('export-main');
  const titleParts=[
    (document.getElementById('d-adv')||{}).value,
    (document.getElementById('d-plat')||{}).value,
    (document.getElementById('d-dev')||{}).value,
    (document.getElementById('d-prod')||{}).value,
  ].filter(Boolean);
  const titleStr=titleParts.length?titleParts.join(' · '):'전체 자산';
  main.innerHTML=`
    ${hasSensitive?`<div class="warning-bar">⚠️ 메모 또는 캠페인 ID가 포함돼 있어요. 광고주 전달 전 반드시 확인해 주세요.</div>`:''}
    <div class="doc-header-bar">
      <div><div class="doc-title">${titleStr}</div><div class="doc-sub">총 ${totalCount}개 · ${new Date().toLocaleDateString('ko-KR')} 생성</div></div>
      <button class="doc-export-btn" onclick="alert('실제 배포 시 PDF 내보내기 구현')">PDF 내보내기 ↓</button>
    </div>
    <div class="doc-hint">↕ 카드를 드래그해서 순서를 바꿀 수 있어요 · ✕ 버튼으로 특정 이미지를 문서에서 제외할 수 있어요</div>
    <div class="doc-preview">
      <div class="doc-head">
        <div class="doc-head-title">${titleStr} — 게재 레퍼런스</div>
        <div class="doc-head-sub">포함 정보: ${checked.map(k=>EXPORT_FIELDS.find(f=>f.id==='ef_'+k)?.label.replace(' ⚠️','')||k).join(', ')}</div>
      </div>
      <div class="reorder-grid" id="reorder-grid"></div>
    </div>`;
  renderDocCards(checked);
}

function renderDocCards(checked){
  if(!checked){
    checked=EXPORT_FIELDS.filter(f=>(document.getElementById(f.id)||{}).checked).map(f=>f.id.replace('ef_',''));
  }
  const grid=document.getElementById('reorder-grid');if(!grid)return;
  grid.innerHTML=docItems.map((c,i)=>{
    const meta=[];
    if(checked.includes('advertiser'))meta.push(c.advertiser);
    if(checked.includes('platform'))meta.push(c.platform);
    if(checked.includes('device'))meta.push(c.device);
    if(checked.includes('product'))meta.push(c.product);
    if(checked.includes('date'))meta.push(c.date);
    return `<div class="doc-card" draggable="true" data-idx="${i}"
      ondragstart="dragStart(event,${i})"
      ondragover="dragOver(event,${i})"
      ondrop="dragDrop(event,${i})"
      ondragend="dragEnd()">
      <div class="doc-card-img ${c.phClass||'ph-tving'}">${c.url?`<img src="${c.url}" alt="">`:`<span style="font-size:8px;font-weight:700;letter-spacing:.1em;font-family:var(--mono)">${c.platform}</span>`}</div>
      <div class="doc-card-handle" title="드래그해서 이동">⠿</div>
      <div class="doc-card-idx">${i+1}</div>
      <button class="doc-card-remove" onclick="removeDocCard(${i})" title="문서에서 제외">✕</button>
      <div class="doc-card-body">
        <div class="doc-card-name">${c.advertiser}</div>
        <div class="doc-card-meta">${meta.join(' · ')||'–'}</div>
      </div>
    </div>`;
  }).join('');
}

/* drag-reorder */
function dragStart(e,idx){dragSrcIdx=idx;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragOver(e,idx){e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.doc-card').forEach((el,i)=>el.classList.toggle('drag-over',i===idx&&i!==dragSrcIdx));}
function dragDrop(e,idx){e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===idx)return;const moved=docItems.splice(dragSrcIdx,1)[0];docItems.splice(idx,0,moved);renderDocCards();}
function dragEnd(){dragSrcIdx=null;document.querySelectorAll('.doc-card').forEach(el=>{el.classList.remove('dragging','drag-over')});}
function removeDocCard(idx){docItems.splice(idx,1);renderDocCards();}

/* ── TABS ── */
function switchTab(t){
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  document.querySelectorAll('.screen').forEach(el=>el.classList.toggle('active',el.id==='s-'+t));
  if(t==='browse')setTimeout(renderBrowse,0);
  // update nav counts
  document.querySelectorAll('.nav-tab').forEach(el=>{
    const badge=el.querySelector('.nav-count');if(!badge)return;
    if(el.dataset.tab==='browse')badge.textContent=items.length;
    if(el.dataset.tab==='upload')badge.textContent=queue.filter(Boolean).length||'';
  });
}

        <div class="dz-chip">💡 한 달치를 한꺼번에 올려도 괜찮아요</div>
      </div>
      <div class="qheader" id="qheader">

        <button class="btn btn-primary" id="bsave" onclick="saveAll()" disabled style="font-size:12px;padding:6px 14px">전체 저장 →</button>

  <div class="screen" id="s-export">

  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()"></div>

  const dz=document.getElementById('dropzone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');addFiles(e.dataTransfer.files)});

}
build();
</script>
