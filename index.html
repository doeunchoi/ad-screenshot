
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --bg:#F5F4F1;--surface:#FFFFFF;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);
  --text:#1A1A18;--text-2:#6B6B67;--text-3:#A8A8A3;
  --teal:#0D6E56;--teal-bg:#E1F5EE;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --green:#3B6D11;--green-bg:#EAF3DE;
  --radius:10px;--radius-sm:6px;
}
#root{font-family:var(--font);background:var(--bg);min-height:600px;display:flex;flex-direction:column;border-radius:12px;overflow:hidden}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:stretch;justify-content:space-between}
.nav-brand{display:flex;align-items:center;gap:8px;padding:12px 0}
.nav-dot{width:8px;height:8px;background:var(--text);border-radius:50%}
.nav-title{font-size:13px;font-weight:500;letter-spacing:-0.01em}
.nav-tabs{display:flex}
.nav-tab{font-size:12px;color:var(--text-3);padding:0 16px;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;transition:color .15s}
.nav-tab:hover{color:var(--text-2)}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.nav-badge{font-size:10px;background:var(--bg);color:var(--text-3);padding:1px 6px;border-radius:10px;font-family:var(--mono)}
.nav-right{display:flex;align-items:center;font-size:11px;color:var(--text-3);font-family:var(--mono)}

.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex}

/* TOOLTIP helper */
.tip{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:var(--bg);border:1px solid var(--border-md);font-size:9px;color:var(--text-3);cursor:default;position:relative;flex-shrink:0}
.tip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);white-space:nowrap;background:var(--text);color:#fff;font-size:10px;padding:4px 8px;border-radius:5px;pointer-events:none;z-index:99;line-height:1.4;max-width:220px;white-space:normal;text-align:center}
.tip:hover::before{content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--text)}

/* HELPER BANNER */
.helper{background:var(--blue-bg);border-bottom:1px solid rgba(24,95,165,.12);padding:8px 20px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--blue)}
.helper-icon{font-size:13px;flex-shrink:0}
.helper-close{margin-left:auto;cursor:pointer;opacity:.6;font-size:13px;background:none;border:none;color:var(--blue);line-height:1}

/* BROWSE */
.browse-top{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
.browse-filter-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.fsel{font-size:12px;font-family:var(--font);padding:5px 24px 5px 10px;border:1px solid var(--border-md);border-radius:20px;background:var(--surface);color:var(--text-2);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23A8A8A3' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 8px center}
.finput{font-size:12px;font-family:var(--font);padding:5px 10px;border:1px solid var(--border-md);border-radius:20px;background:var(--surface);color:var(--text);outline:none;min-width:130px}
.finput::placeholder{color:var(--text-3)}
.browse-meta{display:flex;align-items:center;gap:8px}
.browse-count{font-size:11px;color:var(--text-3);font-family:var(--mono)}
.browse-hint{font-size:11px;color:var(--text-3)}

.browse-grid{padding:14px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;overflow-y:auto;flex:1}
.browse-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--text-3)}
.browse-empty-icon{font-size:24px;opacity:.4}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s}
.card:hover{border-color:var(--border-md);transform:translateY(-1px)}
.card-img{width:100%;aspect-ratio:16/9;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:10px 12px}
.card-name{font-size:13px;font-weight:500;margin-bottom:6px;color:var(--text)}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.tag-teal{background:var(--teal-bg);color:var(--teal)}
.tag-amber{background:var(--amber-bg);color:var(--amber)}
.tag-gray{background:#F1EFE8;color:#5F5E5A}
.card-date{font-size:10px;color:var(--text-3);font-family:var(--mono)}

/* UPLOAD */
.upload-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.section-title{font-size:12px;font-weight:500;color:var(--text-2);display:flex;align-items:center;gap:5px}
.dropzone{border:1.5px dashed var(--border-md);border-radius:var(--radius);background:var(--surface);padding:28px 20px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.dropzone:hover,.dropzone.drag{border-color:var(--text-2);background:#FAFAF8}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:22px;margin-bottom:6px}
.dz-title{font-size:13px;font-weight:500;margin-bottom:3px}
.dz-sub{font-size:11px;color:var(--text-3);line-height:1.6}
.dz-tip{margin-top:8px;font-size:10px;color:var(--text-3);background:var(--bg);border-radius:5px;padding:5px 10px;display:inline-block}

.queue-header{display:flex;align-items:center;justify-content:space-between}
.queue-label{font-size:12px;font-weight:500;color:var(--text-2)}
.queue-hint{font-size:11px;color:var(--text-3);margin-top:2px}
.btn-save-all{font-size:12px;padding:6px 16px;border-radius:6px;background:var(--text);color:white;border:none;cursor:pointer;font-family:var(--font);font-weight:500;transition:opacity .15s}
.btn-save-all:hover{opacity:.8}
.btn-save-all:disabled{opacity:.35;cursor:default}

.queue-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.qi-top{display:flex;gap:12px;padding:12px;align-items:flex-start}
.qi-thumb{width:96px;min-width:96px;aspect-ratio:16/9;background:var(--bg);border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.qi-thumb img{width:100%;height:100%;object-fit:cover}
.qi-fields{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.qi-field{display:flex;flex-direction:column;gap:3px}
.qi-label-row{display:flex;align-items:center;gap:3px}
.qi-label{font-size:10px;color:var(--text-3);font-weight:500;letter-spacing:.02em;text-transform:uppercase}
.qi-input{font-size:12px;font-family:var(--font);padding:5px 8px;border:1px solid var(--border-md);border-radius:5px;background:var(--bg);color:var(--text);outline:none;width:100%}
.qi-input:focus{border-color:var(--text-2);background:var(--surface)}
.qi-input.ai-filled{border-color:#9FE1CB;background:#F5FEFB}
.qi-status{display:flex;align-items:center;gap:6px;padding:6px 12px 10px;flex-wrap:wrap}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-analyzing{background:var(--amber);animation:pulse 1s ease-in-out infinite}
.status-done{background:var(--teal)}
.status-error{background:var(--red)}
.status-text{font-size:11px;color:var(--text-3);font-family:var(--mono)}
.ai-badge{font-size:10px;background:var(--teal-bg);color:var(--teal);padding:1px 6px;border-radius:10px;font-weight:500}
.qi-remove{font-size:11px;color:var(--text-3);background:none;border:none;cursor:pointer;padding:0 4px;flex-shrink:0}
.qi-remove:hover{color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* EXPORT */
.export-wrap{flex:1;display:flex;overflow:hidden}
.export-sidebar{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);padding:16px 14px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.sidebar-section{display:flex;flex-direction:column;gap:6px}
.sidebar-label-row{display:flex;align-items:center;gap:4px}
.sidebar-label{font-size:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3)}
.sidebar-sel{width:100%;font-size:12px;font-family:var(--font);padding:6px 8px;border:1px solid var(--border-md);border-radius:6px;background:var(--bg);color:var(--text);outline:none;appearance:none;-webkit-appearance:none}
.sidebar-input{width:100%;font-size:12px;font-family:var(--font);padding:6px 8px;border:1px solid var(--border-md);border-radius:6px;background:var(--bg);color:var(--text);outline:none}
.sidebar-input::placeholder{color:var(--text-3)}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:2px 0}

/* 공개 옵션 체크박스 */
.export-options{display:flex;flex-direction:column;gap:5px}
.opt-row{display:flex;align-items:center;gap:6px;cursor:pointer}
.opt-row input[type=checkbox]{width:13px;height:13px;cursor:pointer;accent-color:var(--teal)}
.opt-label{font-size:11px;color:var(--text-2);line-height:1.4}
.opt-label.sensitive{color:var(--red);text-decoration:line-through;opacity:.6}
.opt-hint{font-size:10px;color:var(--text-3)}

.btn-gen{width:100%;font-size:12px;padding:8px;border-radius:6px;background:var(--text);color:white;border:none;cursor:pointer;font-family:var(--font);font-weight:500;margin-top:auto}
.btn-gen:hover{opacity:.8}

.export-main{flex:1;padding:18px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.export-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text-3)}
.export-empty-icon{font-size:28px;opacity:.3}
.export-empty-text{font-size:12px;text-align:center;line-height:1.6}

.doc-actions{display:flex;align-items:center;justify-content:space-between}
.doc-title-text{font-size:14px;font-weight:500}
.doc-sub-text{font-size:11px;color:var(--text-3);margin-top:2px;font-family:var(--mono)}
.btn-export{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border-md);background:var(--surface);cursor:pointer;font-family:var(--font)}
.doc-preview{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.doc-head{padding:16px 20px;border-bottom:1px solid var(--border)}
.doc-head-title{font-size:14px;font-weight:500;margin-bottom:3px}
.doc-head-sub{font-size:11px;color:var(--text-3);font-family:var(--mono)}
.doc-grid{padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.doc-item-img{background:var(--bg);border-radius:6px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;overflow:hidden}
.doc-item-img img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.doc-item-meta{font-size:10px;color:var(--text-3);margin-top:4px;font-family:var(--mono);line-height:1.5}
.redacted{background:var(--red-bg);color:var(--red);font-size:9px;padding:1px 5px;border-radius:3px;font-style:normal}

/* 경고 배너 */
.sensitive-warning{background:var(--amber-bg);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--amber);display:flex;gap:6px;align-items:flex-start;line-height:1.5}

.ph-tving{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);display:flex;align-items:center;justify-content:center;color:#e94560;font-size:10px;font-weight:700;letter-spacing:.1em;font-family:var(--mono)}
.ph-wavve{background:linear-gradient(135deg,#00b4db 0%,#0083b0 100%);display:flex;align-items:center;justify-content:center;color:white;font-size:10px;font-weight:700;letter-spacing:.1em;font-family:var(--mono)}
</style>

<div id="root"></div>

<script>
const INDUSTRIES=["Alcohol","App/Service","Auto","Bank/Card","Beauty","Beverage","Commerce/Retail","Consumer Goods","Consumer Electronics","Education","Entertainment","Fashion","Food","Food Franchise","Functional Food","Game","Government","Home","Insurance","Investment/Securities","Pharma","PR","Telecom","Travel","Etc."];
const PLATFORMS=["TVING","Wavve"];
const DEVICES=["Mobile","PC","CTV/Smart TV","Tablet"];
const PRODUCTS=["KBO","인스트림 동영상","이미지배너","스플래시배너","일시정지","아웃스트림","협찬/PPL","기타"];

// 민감 필드 정의: 내보낼 때 선택 가능
const EXPORT_FIELDS=[
  {id:"f_advertiser", label:"광고주명", sensitive:false, default:true},
  {id:"f_industry",   label:"업종",    sensitive:false, default:true},
  {id:"f_platform",   label:"지면 (TVING/Wavve)", sensitive:false, default:true},
  {id:"f_device",     label:"디바이스", sensitive:false, default:true},
  {id:"f_product",    label:"상품 유형", sensitive:false, default:true},
  {id:"f_date",       label:"게재 날짜", sensitive:false, default:true},
  {id:"f_memo",       label:"메모/특이사항", sensitive:true, default:false},
  {id:"f_campaign",   label:"캠페인 ID", sensitive:true, default:false},
];

const SAMPLES=[
  {advertiser:"Samsung Electronics",industry:"Consumer Electronics",platform:"TVING",device:"Mobile",product:"인스트림 동영상",date:"2025.04.03",memo:"",campaign:"CMP-001",phClass:"ph-tving"},
  {advertiser:"Hyundai Motor",industry:"Auto",platform:"Wavve",device:"CTV/Smart TV",product:"KBO",date:"2025.04.05",memo:"경기 전 노출",campaign:"CMP-002",phClass:"ph-wavve"},
  {advertiser:"Lotte Chilsung",industry:"Beverage",platform:"TVING",device:"PC",product:"이미지배너",date:"2025.04.07",memo:"",campaign:"CMP-003",phClass:"ph-tving"},
  {advertiser:"KB Kookmin Bank",industry:"Bank/Card",platform:"TVING",device:"Mobile",product:"스플래시배너",date:"2025.04.10",memo:"신규 상품 론칭",campaign:"CMP-004",phClass:"ph-tving"},
  {advertiser:"Nike Korea",industry:"Fashion",platform:"Wavve",device:"Mobile",product:"인스트림 동영상",date:"2025.04.12",memo:"",campaign:"CMP-005",phClass:"ph-wavve"},
  {advertiser:"GS25",industry:"Commerce/Retail",platform:"TVING",device:"CTV/Smart TV",product:"일시정지",date:"2025.04.15",memo:"",campaign:"CMP-006",phClass:"ph-tving"},
];

let queue=[];
let savedItems=[...SAMPLES];
let helperVisible={browse:true,upload:true,export:true};

function tagColor(val){
  if(PLATFORMS.includes(val)) return "tag-blue";
  if(DEVICES.includes(val)) return "tag-teal";
  if(PRODUCTS.includes(val)) return "tag-amber";
  return "tag-gray";
}

function selOpts(arr,sel="",empty="전체"){
  return `<option value="">${empty}</option>`+arr.map(o=>`<option ${o===sel?"selected":""}>${o}</option>`).join('');
}

function tipEl(text){
  return `<span class="tip" data-tip="${text}">?</span>`;
}

/* ── BROWSE ── */
function renderBrowse(){
  const adv=(document.getElementById('f-adv')||{}).value||"";
  const plat=(document.getElementById('f-plat')||{}).value||"";
  const dev=(document.getElementById('f-dev')||{}).value||"";
  const ind=(document.getElementById('f-ind')||{}).value||"";
  const prod=(document.getElementById('f-prod')||{}).value||"";
  const filtered=savedItems.filter(c=>{
    if(adv&&!c.advertiser.toLowerCase().includes(adv.toLowerCase())) return false;
    if(plat&&c.platform!==plat) return false;
    if(dev&&c.device!==dev) return false;
    if(ind&&c.industry!==ind) return false;
    if(prod&&c.product!==prod) return false;
    return true;
  });
  const grid=document.getElementById('browse-grid');
  if(!grid) return;
  document.getElementById('browse-count').textContent=`${filtered.length}개`;
  if(filtered.length===0){
    grid.innerHTML=`<div class="browse-empty" style="grid-column:1/-1"><div class="browse-empty-icon">🔍</div><div style="font-size:12px;color:var(--text-3)">조건에 맞는 이미지가 없어요.<br>필터를 조정하거나 이미지를 먼저 업로드해 주세요.</div></div>`;
    return;
  }
  grid.innerHTML=filtered.map(c=>`
    <div class="card">
      <div class="card-img">
        ${c.url?`<img src="${c.url}" alt="${c.advertiser}">`:`<div class="${c.phClass||'ph-tving'}" style="width:100%;height:100%">${c.platform}</div>`}
      </div>
      <div class="card-body">
        <div class="card-name">${c.advertiser}</div>
        <div class="tags">
          <span class="tag ${tagColor(c.platform)}">${c.platform}</span>
          <span class="tag ${tagColor(c.device)}">${c.device}</span>
          <span class="tag ${tagColor(c.product)}">${c.product}</span>
          <span class="tag tag-gray">${c.industry}</span>
        </div>
        <div class="card-date">${c.date}</div>
      </div>
    </div>`).join('');
}

/* ── UPLOAD / QUEUE ── */
async function analyzeImage(file,idx){
  setStatus(idx,'analyzing','AI가 이미지를 분석하고 있어요...');
  const b64=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.readAsDataURL(file)});
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}},
          {type:'text',text:`This is an ad monitoring screenshot from a Korean streaming platform. Analyze and return ONLY a JSON object (no markdown):
{"advertiser":"brand name in English","industry":"one of: ${INDUSTRIES.join(', ')}","platform":"TVING or Wavve","device":"one of: ${DEVICES.join(', ')}","product":"one of: ${PRODUCTS.join(', ')}"}`}
        ]}]
      })
    });
    const data=await resp.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'{}';
    let parsed={};try{parsed=JSON.parse(text.replace(/```json|```/g,''))}catch(e){}
    queue[idx]={...queue[idx],...parsed,aiDone:true};
    refillQueueItem(idx);
    setStatus(idx,'done','AI 분석 완료 — 내용을 확인하고 수정해 주세요');
  }catch(e){
    setStatus(idx,'error','분석 실패 — 직접 입력해 주세요');
  }
}

function setStatus(idx,type,text){
  const el=document.getElementById(`qi-status-${idx}`);
  if(!el) return;
  const ai=type==='done'?`<span class="ai-badge">AI 자동입력</span>`:'';
  el.innerHTML=`<span class="status-dot status-${type}"></span><span class="status-text">${text}</span>${ai}`;
}

function refillQueueItem(idx){
  const item=queue[idx];if(!item) return;
  const ai='ai-filled';
  ['adv','ind','plat','dev','prod'].forEach(k=>{
    const map={adv:'advertiser',ind:'industry',plat:'platform',dev:'device',prod:'product'};
    const el=document.getElementById(`qi-${k}-${idx}`);
    if(!el) return;
    if(el.tagName==='INPUT') el.value=item[map[k]]||'';
    else{
      Array.from(el.options).forEach(o=>{if(o.value===item[map[k]])o.selected=true});
    }
    el.classList.add(ai);
  });
}

function addFiles(files){
  Array.from(files).forEach((file,i)=>{
    const idx=queue.length;
    const url=URL.createObjectURL(file);
    queue.push({file,url,advertiser:'',industry:'',platform:'',device:'',product:'',memo:'',campaign:'',aiDone:false});
    const list=document.getElementById('queue-list');
    const div=document.createElement('div');
    div.className='queue-item';div.id=`qi-${idx}`;
    div.innerHTML=`
      <div class="qi-top">
        <div class="qi-thumb"><img src="${url}" alt=""></div>
        <div class="qi-fields">
          <div class="qi-field">
            <div class="qi-label-row"><span class="qi-label">광고주</span>${tipEl('브랜드명을 입력하거나 AI가 자동으로 채워줍니다')}</div>
            <input class="qi-input" id="qi-adv-${idx}" placeholder="예: Samsung">
          </div>
          <div class="qi-field">
            <div class="qi-label-row"><span class="qi-label">업종</span></div>
            <select class="qi-input" id="qi-ind-${idx}">${selOpts(INDUSTRIES,'','업종 선택')}</select>
          </div>
          <div class="qi-field">
            <div class="qi-label-row"><span class="qi-label">지면</span></div>
            <select class="qi-input" id="qi-plat-${idx}">${selOpts(PLATFORMS,'','지면 선택')}</select>
          </div>
          <div class="qi-field">
            <div class="qi-label-row"><span class="qi-label">디바이스</span></div>
            <select class="qi-input" id="qi-dev-${idx}">${selOpts(DEVICES,'','선택')}</select>
          </div>
          <div class="qi-field">
            <div class="qi-label-row"><span class="qi-label">상품 유형</span></div>
            <select class="qi-input" id="qi-prod-${idx}">${selOpts(PRODUCTS,'','선택')}</select>
          </div>
          <div class="qi-field">
            <div class="qi-label-row"><span class="qi-label">캠페인 ID</span>${tipEl('내부 캠페인 ID입니다. 레퍼런스 문서 내보낼 때 포함 여부를 선택할 수 있어요')}</div>
            <input class="qi-input" id="qi-camp-${idx}" placeholder="CMP-XXX (선택)">
          </div>
          <div class="qi-field" style="grid-column:1/-1">
            <div class="qi-label-row"><span class="qi-label">메모</span>${tipEl('내부용 메모입니다. 광고주에게 내보낼 때 제외할 수 있어요')}</div>
            <input class="qi-input" id="qi-memo-${idx}" placeholder="특이사항, 확인 내용 등 (선택)">
          </div>
        </div>
        <button class="qi-remove" onclick="removeItem(${idx})" title="삭제">✕</button>
      </div>
      <div class="qi-status" id="qi-status-${idx}">
        <span class="status-dot status-analyzing"></span>
        <span class="status-text">분석 대기 중...</span>
      </div>`;
    list.appendChild(div);
    document.getElementById('queue-header').style.display='flex';
    document.getElementById('btn-save-all').disabled=false;
    setTimeout(()=>analyzeImage(file,idx),i*400);
  });
}

function removeItem(idx){
  queue[idx]=null;
  const el=document.getElementById(`qi-${idx}`);
  if(el) el.remove();
  const remaining=queue.filter(Boolean);
  if(!remaining.length){
    document.getElementById('queue-header').style.display='none';
    document.getElementById('btn-save-all').disabled=true;
  }
}

function saveAll(){
  queue.forEach((item,idx)=>{
    if(!item) return;
    const adv=document.getElementById(`qi-adv-${idx}`)?.value||'';
    if(!adv) return;
    savedItems.unshift({
      advertiser:adv,
      industry:document.getElementById(`qi-ind-${idx}`)?.value||'',
      platform:document.getElementById(`qi-plat-${idx}`)?.value||'',
      device:document.getElementById(`qi-dev-${idx}`)?.value||'',
      product:document.getElementById(`qi-prod-${idx}`)?.value||'',
      memo:document.getElementById(`qi-memo-${idx}`)?.value||'',
      campaign:document.getElementById(`qi-camp-${idx}`)?.value||'',
      date:new Date().toISOString().slice(0,10).replace(/-/g,'.'),
      url:item.url,
      phClass:item.platform==='Wavve'?'ph-wavve':'ph-tving'
    });
  });
  queue=[];
  document.getElementById('queue-list').innerHTML='';
  document.getElementById('queue-header').style.display='none';
  document.getElementById('btn-save-all').disabled=true;
  switchTab('browse');
}

/* ── EXPORT ── */
function generateDoc(){
  const adv=(document.getElementById('d-adv')||{}).value||'';
  const plat=(document.getElementById('d-plat')||{}).value||'';
  const dev=(document.getElementById('d-dev')||{}).value||'';
  const prod=(document.getElementById('d-prod')||{}).value||'';
  const ind=(document.getElementById('d-ind')||{}).value||'';

  const checked=EXPORT_FIELDS.filter(f=>{
    const el=document.getElementById(f.id);
    return el&&el.checked;
  }).map(f=>f.id.replace('f_',''));

  const items=savedItems.filter(c=>{
    if(adv&&!c.advertiser.toLowerCase().includes(adv.toLowerCase())) return false;
    if(plat&&c.platform!==plat) return false;
    if(dev&&c.device!==dev) return false;
    if(prod&&c.product!==prod) return false;
    if(ind&&c.industry!==ind) return false;
    return true;
  });

  const main=document.getElementById('export-main');
  const titleParts=[adv,plat,dev,prod].filter(Boolean);
  const titleStr=titleParts.length?titleParts.join(' · '):'전체 자산';
  const hasSensitive=EXPORT_FIELDS.some(f=>f.sensitive&&document.getElementById(f.id)?.checked);

  const warningHtml=hasSensitive?`<div class="sensitive-warning">⚠️ 메모 또는 캠페인 ID가 포함되어 있어요. 광고주에게 전달 전 내용을 반드시 확인해 주세요.</div>`:'';

  const docItems=items.slice(0,8).map(c=>{
    const meta=[];
    if(checked.includes('advertiser')) meta.push(c.advertiser);
    if(checked.includes('platform'))   meta.push(c.platform);
    if(checked.includes('device'))     meta.push(c.device);
    if(checked.includes('product'))    meta.push(c.product);
    if(checked.includes('date'))       meta.push(c.date);
    if(checked.includes('industry'))   meta.push(c.industry);
    if(checked.includes('memo')&&c.memo) meta.push(`메모: ${c.memo}`);
    if(checked.includes('campaign')&&c.campaign) meta.push(`ID: ${c.campaign}`);
    return `<div>
      <div class="doc-item-img ${c.phClass||'ph-tving'}">${c.url?`<img src="${c.url}" alt="">`:`<span style="font-size:10px;font-weight:700;letter-spacing:.1em;font-family:var(--mono)">${c.platform}</span>`}</div>
      <div class="doc-item-meta">${meta.join(' · ')||'–'}</div>
    </div>`;
  }).join('');

  main.innerHTML=`
    ${warningHtml}
    <div class="doc-actions">
      <div>
        <div class="doc-title-text">${titleStr}</div>
        <div class="doc-sub-text">총 ${items.length}개 · ${new Date().toLocaleDateString('ko-KR')} 생성</div>
      </div>
      <button class="btn-export" onclick="alert('PDF 내보내기: 실제 배포 시 jsPDF 또는 서버사이드 렌더링으로 구현됩니다')">PDF 내보내기 ↓</button>
    </div>
    <div class="doc-preview">
      <div class="doc-head">
        <div class="doc-head-title">${titleStr} — 게재 레퍼런스</div>
        <div class="doc-head-sub">포함된 정보: ${checked.map(k=>EXPORT_FIELDS.find(f=>f.id==='f_'+k)?.label||k).join(', ')}</div>
      </div>
      <div class="doc-grid">${docItems||'<div style="grid-column:1/-1;text-align:center;padding:20px;font-size:12px;color:var(--text-3)">조건에 맞는 자산이 없어요</div>'}</div>
    </div>`;
}

/* ── TABS ── */
function switchTab(t){
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
  document.querySelectorAll('.screen').forEach(el=>el.classList.toggle('active',el.id==='screen-'+t));
  if(t==='browse') setTimeout(renderBrowse,0);
}

function dismissHelper(tab){
  helperVisible[tab]=false;
  const el=document.getElementById(`helper-${tab}`);
  if(el) el.style.display='none';
}

/* ── BUILD ── */

  document.getElementById('root').innerHTML=`
  <div class="nav">
    <div class="nav-brand"><div class="nav-dot"></div><div class="nav-title">Ad Monitoring Hub</div></div>
    <div class="nav-tabs">
      <div class="nav-tab active" data-tab="browse" onclick="switchTab('browse')">이미지 조회</div>
      <div class="nav-tab" data-tab="upload" onclick="switchTab('upload')">업로드</div>
      <div class="nav-tab" data-tab="export" onclick="switchTab('export')">레퍼런스 내보내기</div>
    </div>
    <div class="nav-right">TVING · Ad Biz</div>
  </div>

  <!-- BROWSE -->
  <div class="screen active" id="screen-browse">
    <div id="helper-browse" class="helper">
      <span class="helper-icon">💡</span>
      <span>업로드된 게재 스크린샷을 조건별로 필터링해서 찾아볼 수 있어요. 지면·디바이스·업종·상품 유형 중 원하는 조건을 골라보세요.</span>
      <button class="helper-close" onclick="dismissHelper('browse')">✕</button>
    </div>

        <select class="fsel" id="f-dev" onchange="renderBrowse()"><option value="">디바이스 전체</option>${DEVICES.map(o=>`<option>${o}</option>`).join('')}</select>
        <select class="fsel" id="f-ind" onchange="renderBrowse()"><option value="">업종 전체</option>${INDUSTRIES.map(o=>`<option>${o}</option>`).join('')}</select>
        <select class="fsel" id="f-prod" onchange="renderBrowse()"><option value="">상품 전체</option>${PRODUCTS.map(o=>`<option>${o}</option>`).join('')}</select>
        <input class="finput" id="f-adv" placeholder="광고주 검색..." oninput="renderBrowse()">
        <span class="browse-count" id="browse-count">6개</span>
      </div>
      <div class="browse-hint" style="font-size:11px;color:var(--text-3)">필터는 중복 적용 가능해요 — 예: TVING + Mobile + 인스트림 동영상</div>
    </div>
    <div class="browse-grid" id="browse-grid"></div>
  </div>

  <!-- UPLOAD -->
  <div class="screen" id="screen-upload">
    <div id="helper-upload" class="helper">
      <span class="helper-icon">✨</span>
      <span>이미지를 올리면 AI가 광고주, 업종, 지면, 상품 유형을 자동으로 분석해 채워줘요. 내용을 확인하고 수정한 뒤 한꺼번에 저장하면 돼요.</span>
      <button class="helper-close" onclick="dismissHelper('upload')">✕</button>
    </div>
    <div class="upload-wrap">
      <div>
        <div class="section-title">스크린샷 업로드 ${tipEl('여러 장을 한꺼번에 선택하거나 드래그앤드롭으로 올릴 수 있어요')}</div>
        <div style="height:8px"></div>
        <div class="dropzone" id="dropzone">
          <input type="file" multiple accept="image/*" onchange="addFiles(this.files)">
          <div class="dz-icon">↑</div>
          <div class="dz-title">여기에 파일을 드래그하거나 클릭해서 선택하세요</div>
          <div class="dz-sub">PNG, JPG 형식 · 여러 장 동시 업로드 가능<br>업로드하면 AI가 메타데이터를 자동으로 채워줍니다</div>
          <div class="dz-tip">💡 한 달치 스크린샷을 한꺼번에 올려도 괜찮아요</div>
        </div>
      </div>
      <div class="queue-header" id="queue-header" style="display:none">
        <div>
          <div class="queue-label">업로드 대기 목록</div>
          <div class="queue-hint">초록색 테두리는 AI가 자동으로 입력한 항목이에요. 내용을 확인하고 필요하면 수정해 주세요.</div>
        </div>
        <button class="btn-save-all" id="btn-save-all" onclick="saveAll()" disabled>전체 저장 →</button>
      </div>
      <div class="queue-list" id="queue-list"></div>
    </div>
  </div>

  <!-- EXPORT -->
  <div class="screen" id="screen-export">
    <div id="helper-export" class="helper">
      <span class="helper-icon">📄</span>
      <span>광고주에게 보낼 레퍼런스 문서를 만들어요. 포함할 정보를 직접 선택할 수 있어서 내부 메모나 캠페인 ID 같은 민감한 정보는 빼고 내보낼 수 있어요.</span>
      <button class="helper-close" onclick="dismissHelper('export')">✕</button>
    </div>
    <div class="export-wrap">
      <div class="export-sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label-row"><span class="sidebar-label">필터 조건</span>${tipEl('해당 조건의 이미지만 문서에 포함돼요')}</div>
          <input class="sidebar-input" id="d-adv" placeholder="광고주명">

            ${tipEl('체크 해제하면 해당 정보는 문서에 표시되지 않아요. 광고주에게 공개하기 민감한 항목은 꼭 확인해 주세요.')}
          </div>
          <div class="export-options">
            ${EXPORT_FIELDS.map(f=>`
              <label class="opt-row">
                <input type="checkbox" id="${f.id}" ${f.default?'checked':''}>

            `).join('')}

          <div class="export-empty-text">왼쪽에서 조건을 설정하고<br>문서 생성 버튼을 눌러주세요<br><br><span style="font-size:10px;color:var(--text-3)">필터 없이 생성하면 전체 자산이 포함돼요</span></div>

  const dz=document.getElementById('dropzone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');addFiles(e.dataTransfer.files)});
  renderBrowse();
}

buildUI();
</script>
